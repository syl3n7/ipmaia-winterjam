name = "ipmaia-winterjam"
main = ".open-next/worker.js"
compatibility_date = "2026-03-15"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

routes = [
  { pattern = "ipmaia-winterjam.pt", zone_name = "ipmaia-winterjam.pt", custom_domain = true },
  { pattern = "www.ipmaia-winterjam.pt", zone_name = "ipmaia-winterjam.pt", custom_domain = true }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "ipmaia-winterjam"
